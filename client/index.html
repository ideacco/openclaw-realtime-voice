<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenClaw Voice Channel</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-voice-state="disconnected">
    <svg class="filter-defs" width="0" height="0" aria-hidden="true" focusable="false">
      <defs>
        <filter
          id="voice-pill-liquid-idle"
          x="-12%"
          y="-32%"
          width="124%"
          height="164%"
          color-interpolation-filters="sRGB"
        >
          <feFlood x="0" y="0" width="100%" height="100%" flood-color="rgb(127,0,127)" result="neutral" />
          <feFlood x="16%" y="20%" width="16%" height="56%" flood-color="rgb(127,0,176)" result="waveA" />
          <feFlood x="38%" y="12%" width="14%" height="72%" flood-color="rgb(127,0,96)" result="waveB" />
          <feFlood x="58%" y="18%" width="12%" height="60%" flood-color="rgb(127,0,184)" result="waveC" />
          <feFlood x="74%" y="22%" width="10%" height="52%" flood-color="rgb(127,0,88)" result="waveD" />
          <feMerge result="map">
            <feMergeNode in="neutral" />
            <feMergeNode in="waveA" />
            <feMergeNode in="waveB" />
            <feMergeNode in="waveC" />
            <feMergeNode in="waveD" />
          </feMerge>
          <feGaussianBlur in="map" stdDeviation="12" result="mapBlur" />
          <feDisplacementMap
            in="SourceGraphic"
            in2="mapBlur"
            scale="5"
            xChannelSelector="R"
            yChannelSelector="B"
          >
            <animate attributeName="scale" values="4;7;4" dur="7s" repeatCount="indefinite" />
          </feDisplacementMap>
        </filter>

        <filter
          id="voice-pill-liquid-active"
          x="-16%"
          y="-36%"
          width="132%"
          height="172%"
          color-interpolation-filters="sRGB"
        >
          <feFlood x="0" y="0" width="100%" height="100%" flood-color="rgb(127,0,127)" result="neutral" />
          <feFlood x="14%" y="14%" width="18%" height="68%" flood-color="rgb(127,0,196)" result="waveA" />
          <feFlood x="34%" y="10%" width="14%" height="74%" flood-color="rgb(127,0,74)" result="waveB" />
          <feFlood x="52%" y="16%" width="14%" height="66%" flood-color="rgb(127,0,205)" result="waveC" />
          <feFlood x="70%" y="22%" width="12%" height="54%" flood-color="rgb(127,0,82)" result="waveD" />
          <feMerge result="map">
            <feMergeNode in="neutral" />
            <feMergeNode in="waveA" />
            <feMergeNode in="waveB" />
            <feMergeNode in="waveC" />
            <feMergeNode in="waveD" />
          </feMerge>
          <feGaussianBlur in="map" stdDeviation="14" result="mapBlur" />
          <feDisplacementMap
            in="SourceGraphic"
            in2="mapBlur"
            scale="10"
            xChannelSelector="R"
            yChannelSelector="B"
          >
            <animate attributeName="scale" values="8;14;8" dur="2.4s" repeatCount="indefinite" />
          </feDisplacementMap>
        </filter>
      </defs>
    </svg>

    <div class="bg-photo" aria-hidden="true"></div>
    <div class="bg-vignette" aria-hidden="true"></div>
    <div class="bg-noise" aria-hidden="true"></div>

    <main class="app-shell">
      <header class="topbar">
        <p id="wakeGreeting" class="wake-greeting" hidden>嗨，我是「你好老六」，想要做点什么？</p>
        <div class="topbar-meta">
          <details class="control-drawer">
            <summary>
              <span class="status-dot" aria-hidden="true"></span>
              <span id="status">点击连接</span>
            </summary>
            <div class="drawer-grid">
              <label class="token-wrap">
                <span>Token</span>
                <input id="token" value="dev-token" />
              </label>

              <div class="drawer-actions">
                <button id="connectBtn">连接</button>
                <button id="disconnectBtn" disabled>断开</button>
                <button id="wakeToggleBtn" disabled>唤醒模式：开</button>
                <button id="pttToggleBtn" disabled>空格按住说话：开</button>
                <button id="devModeToggleBtn">开发模式：关</button>
              </div>
            </div>
          </details>
        </div>
      </header>

      <section class="stage-layout">
        <section class="stream-column">
          <section class="assistant-stream" id="assistantStream" aria-live="polite"></section>
        </section>

        <aside class="voice-dock">
          <section class="floating-card">
            <p id="wakeStateLabel" class="card-state">未连接</p>
            <p id="channelLinkStatus" class="channel-meta sr-only">未启动</p>

            <button id="recordBtn" class="voice-orb" aria-label="语音输入按钮">
              <span class="orb-halo orb-halo-1" aria-hidden="true"></span>
              <span class="orb-halo orb-halo-2" aria-hidden="true"></span>
              <span class="listening-wave listening-wave-1" aria-hidden="true"></span>
              <span class="listening-wave listening-wave-2" aria-hidden="true"></span>
              <span class="voice-pill-shell">
                <span class="voice-pill-glass" aria-hidden="true"></span>
                <span class="voice-pill-label">
                  <span class="voice-pill-spark">✦</span>
                  <span class="voice-pill-text">OpenClaw Voice</span>
                </span>
              </span>
            </button>

            <button id="stopBtn" class="dock-stop-btn" type="button" hidden>停止播放</button>

            <div class="dock-transcript">
              <p id="finalTranscript" class="transcript muted">服务端 ASR 结果：-</p>
            </div>
          </section>
        </aside>
      </section>

      <details class="debug-panel" id="debugPanel" hidden>
        <summary>调试面板</summary>
        <div class="debug-grid">
          <label class="full">
            实时识别
            <p id="liveTranscript" class="debug-transcript">（连接后自动进入唤醒待命）</p>
          </label>
          <label>
            唤醒词（服务端 .env）
            <input id="wakeWordsInput" value="你好老六" readonly />
          </label>
          <label>
            静音自动提交（ms）
            <input id="silenceMsInput" type="number" min="600" max="5000" step="100" value="1200" />
          </label>
          <label class="full">
            文本调试输入
            <textarea id="inputText" rows="3">你好，我想测试新的 Voice Channel 插件链路。</textarea>
          </label>
          <div class="debug-row full">
            <button id="speakBtn" disabled>发送文本</button>
            <span id="channelLastError">-</span>
          </div>
          <label class="full">
            最后一条服务端事件（JSON）
            <pre id="lastServerEvent">-</pre>
          </label>
          <label class="full">
            日志
            <pre id="log"></pre>
          </label>
        </div>
      </details>
    </main>

    <script src="/vendor/markdown-it.min.js"></script>
    <script src="/vendor/purify.min.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
